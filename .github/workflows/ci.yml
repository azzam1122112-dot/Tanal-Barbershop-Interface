name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tanal_user
          POSTGRES_PASSWORD: tanal_ci_password
          POSTGRES_DB: tanal_loyalty
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tanal_user -d tanal_loyalty"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://tanal_user:tanal_ci_password@localhost:5432/tanal_loyalty?schema=public
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run prisma:deploy

      - name: Seed database
        run: npm run prisma:seed

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit (non-blocking)
        run: npm audit --omit=dev || true
